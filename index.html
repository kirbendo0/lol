<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Hub de Trackers - LoL</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0a0c;
            --gold: #c8aa6e;
            --gold-hover: #f0e6d2;
            --card-bg: #1e2328;
            --text: #a09b8c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Fond abstrait sombre */
            background-image: radial-gradient(circle at top, #1e2328 0%, #0a0a0c 100%);
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
            width: 100%;
            border-bottom: 1px solid rgba(200, 170, 110, 0.2);
        }

        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h1 span { color: var(--gold); }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Grille des champions */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 50px 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Style des cartes (liens) */
        .champ-card {
            background: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .champ-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(200, 170, 110, 0.2);
        }

        .card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
        }

        .champ-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.5s ease;
        }

        .champ-card:hover .champ-img {
            transform: scale(1.1);
        }

        .card-info {
            padding: 20px;
            text-align: center;
            border-top: 2px solid var(--gold);
            background: linear-gradient(to top, #111, var(--card-bg));
        }

        .champ-name {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: var(--gold-hover);
        }

        .champ-role {
            font-size: 0.9rem;
            color: var(--text);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Bouton pour en ajouter plus plus tard */
        .add-card {
            border: 2px dashed #444;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            min-height: 250px;
        }

        .add-card:hover {
            border-color: var(--text);
            color: var(--text);
            transform: translateY(0);
            box-shadow: none;
        }

        .add-card i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MES <span style="color: var(--gold);">TRACKERS</span></h1>
        <p class="subtitle">Sélectionne un champion pour accéder à ton tableau de bord et tes matchups.</p>
    </header>

    <main class="hub-grid">
        
        <!-- CARTE WARWICK -->
        <a href="warwick.html" class="champ-card">
            <div class="card-img-wrapper">
                <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Warwick_0.jpg" class="champ-img" alt="Warwick">
            </div>
            <div class="card-info">
                <div class="champ-name">WARWICK</div>
                <div class="champ-role"><i class="fas fa-hand-rock"></i> TOPLANE</div>
            </div>
        </a>

        <!-- CARTE KASSADIN -->
        <a href="kassadin.html" class="champ-card">
            <div class="card-img-wrapper">
                <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Kassadin_0.jpg" class="champ-img" alt="Kassadin">
            </div>
            <div class="card-info">
                <div class="champ-name">KASSADIN</div>
                <div class="champ-role"><i class="fas fa-meteor"></i> MIDLANE</div>
            </div>
        </a>

        <!-- CARTE VLADIMIR -->
        <a href="vladimir.html" class="champ-card">
            <div class="card-img-wrapper">
                <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Vladimir_0.jpg" class="champ-img" alt="Vladimir">
            </div>
            <div class="card-info">
                <div class="champ-name">VLADIMIR</div>
                <div class="champ-role"><i class="fas fa-tint"></i> TOPLANE</div>
            </div>
        </a>

        <!-- BOUTON D'AIDE POUR PLUS TARD -->
        <div class="champ-card add-card">
            <i class="fas fa-plus-circle"></i>
            <h3>Nouveau Champion ?</h3>
            <p style="font-size:0.8rem; margin-top:10px; text-align:center; padding:0 10px;">
                Duplique un code existant, renomme-le, et ajoute le lien dans le fichier index.html !
            </p>
        </div>

    </main>

</body>
</html>
